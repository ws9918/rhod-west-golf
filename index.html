<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#11201a" />
<title>Rhod + West Golf Adventures</title>
<link rel="apple-touch-icon" href="crest.jpg" />
<link rel="icon" href="crest.jpg" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f3f1ea; --card:#ffffff; --ink:#16201a; --muted:#7a8279; --faint:#aeb4aa;
    --line:#e8e7df; --green:#15643f; --green-2:#1c8b56; --green-d:#0d4a2d; --gold:#b8902f; --gold-soft:#d9b25a;
    --navy:#243b4f;
    --bad:#c75f43; --mid:#cf9a35; --good:#3f9a64; --great:#15643f;
    --shadow:0 6px 22px rgba(20,35,25,.08); --shadow-lg:0 16px 44px rgba(20,35,25,.18);
    --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);overscroll-behavior-y:none;-webkit-font-smoothing:antialiased}
  #app{max-width:560px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--bg)}
  main{flex:1;overflow:hidden;position:relative}
  .view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding-bottom:96px}
  .view.active{display:block}
  #view-map{padding-bottom:0;overflow:hidden}
  #map{position:absolute;inset:0}
  .serif{font-family:"Fraunces",Georgia,"Times New Roman",serif}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;letter-spacing:-.3px;font-weight:600}
  /* ---------- FEED ---------- */
  .hero{position:relative;height:230px;overflow:hidden}
  .hero img{width:100%;height:100%;object-fit:cover;display:block;background:#11201a}
  .hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,18,12,.25) 0%,rgba(8,18,12,0) 35%,rgba(8,18,12,.72) 100%)}
  .hero .crest{position:absolute;top:calc(14px + var(--sat));left:50%;transform:translateX(-50%);width:48px;height:48px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,.5);box-shadow:0 4px 14px rgba(0,0,0,.4)}
  .hero .ttl{position:absolute;left:20px;right:20px;bottom:18px;color:#fff;text-align:center}
  .hero .ttl .kick{font-size:10.5px;letter-spacing:3px;text-transform:uppercase;opacity:.85;font-weight:700}
  .hero .ttl h1{font-size:30px;margin:4px 0 0;font-weight:600;text-shadow:0 2px 16px rgba(0,0,0,.45)}
  .hero .ttl p{margin:5px 0 0;font-size:12.5px;opacity:.9;letter-spacing:.2px}
  .statbar{display:flex;gap:10px;padding:14px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 8px;text-align:center;box-shadow:var(--shadow)}
  .stat b{display:block;font-size:24px;line-height:1;font-family:"Fraunces",serif;font-weight:600}
  .stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:6px;display:block;font-weight:700}
  .section-h{font-size:11.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);font-weight:800;margin:20px 18px 10px;display:flex;justify-content:space-between;align-items:center}
  .section-h a{color:var(--green);text-decoration:none;font-weight:700;letter-spacing:.2px;text-transform:none;font-size:13px}
  .filters{display:flex;gap:8px;overflow-x:auto;padding:2px 14px 2px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--muted);padding:8px 15px;border-radius:99px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:7px}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .dot{width:9px;height:9px;border-radius:50%}
  /* memory card */
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:20px;margin:0 14px 16px;overflow:hidden;box-shadow:var(--shadow)}
  .mcard.t100{border-color:#ecd9a6;box-shadow:0 6px 22px rgba(184,144,47,.14)}
  .mcard .ph{position:relative;width:100%;aspect-ratio:16/10;background:#e7e6de;overflow:hidden}
  .mcard .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .mcard .ph .pgrad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(8,18,12,.55))}
  .mcard .ph .cnt{position:absolute;right:11px;top:11px;background:rgba(8,18,12,.6);color:#fff;font-size:11px;font-weight:700;padding:4px 9px;border-radius:99px;backdrop-filter:blur(4px)}
  .mcard .ph .av-over{position:absolute;left:12px;bottom:12px}
  .mcard .body{padding:15px}
  .mcard .top{display:flex;align-items:center;gap:12px}
  .mcard .badge{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:18px;flex:0 0 auto;font-family:"Fraunces",serif}
  .mcard .nm{font-family:"Fraunces",serif;font-weight:600;font-size:18px;line-height:1.12;display:flex;align-items:center;gap:7px}
  .mcard .nm .star{color:var(--gold);font-size:13px}
  .mcard .dt{color:var(--muted);font-size:12px;margin-top:3px;letter-spacing:.2px}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
  .tag{font-size:12px;font-weight:700;padding:6px 11px;border-radius:10px;background:#f3f4f0;color:#46504a;display:flex;align-items:center}
  .tag em{font-style:normal;color:var(--faint);font-weight:800;text-transform:uppercase;letter-spacing:.6px;font-size:9.5px;margin-right:6px}
  .tag.win{background:#eef6f0;color:var(--green-d)}
  .tag.win em{color:var(--green-2)}
  .tag.bet{background:#fbf3e0;color:#8a6a18}
  .tag.bet em{color:var(--gold)}
  .mcard .note{font-size:13.5px;color:#4b554d;margin-top:13px;line-height:1.5}
  /* avatars */
  .avgrp{display:flex;align-items:center}
  .avgrp .av:not(:first-child){margin-left:-9px}
  .av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;border:2px solid var(--card);box-shadow:0 1px 3px rgba(0,0,0,.18);font-family:"Inter",sans-serif}
  .av.lg{width:30px;height:30px;font-size:12px}
  .av.w{background:linear-gradient(150deg,var(--green-2),var(--green))}
  .av.r{background:linear-gradient(150deg,#34526b,var(--navy))}
  .av.g{background:linear-gradient(150deg,var(--gold-soft),var(--gold))}
  .av-over .av{border-color:rgba(255,255,255,.92)}
  /* list rows */
  .search{margin:12px 14px 2px;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 14px;box-shadow:var(--shadow)}
  .search input{border:0;outline:0;background:transparent;font-size:15px;width:100%;color:var(--ink);font-family:inherit}
  .row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);margin:0 14px 10px;border-radius:16px;padding:11px;box-shadow:var(--shadow)}
  .rank-no{width:22px;text-align:center;font-weight:700;color:var(--faint);font-size:13px;flex:0 0 auto;font-family:"Fraunces",serif}
  .badge-sm{flex:0 0 auto;width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:16px;font-family:"Fraunces",serif}
  .badge-sm.un{background:#edece5;color:#9aa295;font-size:20px;font-family:"Inter"}
  .row .meta{flex:1;min-width:0}
  .row .nm{font-family:"Fraunces",serif;font-weight:600;font-size:16px;line-height:1.18;display:flex;align-items:center;gap:6px}
  .row .nm .star{color:var(--gold);font-size:12px}
  .row .sb{color:var(--muted);font-size:12.5px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .thumb{width:46px;height:46px;border-radius:13px;object-fit:cover;flex:0 0 auto}
  .chev{color:#d2d6cd;font-size:20px;flex:0 0 auto}
  .row .rt{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  /* battle */
  .battle{margin:6px 14px 2px;border-radius:18px;padding:16px 18px;background:linear-gradient(120deg,#0d4a2d,#1c8b56);color:#fff;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
  .battle .t b{font-size:15px;font-family:"Fraunces",serif;font-weight:600}
  .battle .t span{display:block;font-size:12px;opacity:.9;margin-top:2px}
  .battle button{margin-left:auto;background:#fff;color:var(--green-d);border:0;font-weight:800;padding:11px 17px;border-radius:12px;font-size:13px;white-space:nowrap}
  /* top100 */
  .cover{margin:14px;border-radius:20px;padding:20px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden;background:#0d4a2d}
  .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.32}
  .cover .cc{position:relative}
  .cover .big{font-size:46px;font-weight:600;line-height:1;font-family:"Fraunces",serif}
  .cover .lbl{opacity:.94;font-size:13px;margin-top:5px}
  .cover .bar{height:7px;background:rgba(255,255,255,.25);border-radius:99px;margin-top:14px;overflow:hidden}
  .cover .bar i{display:block;height:100%;background:var(--gold-soft)}
  /* map */
  .map-chip{position:absolute;left:12px;top:calc(12px + var(--sat));z-index:500;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;box-shadow:var(--shadow);font-size:12px}
  .map-chip b{font-size:15px;font-family:"Fraunces",serif}
  .legend{position:absolute;right:12px;bottom:18px;z-index:500;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 10px;box-shadow:var(--shadow);font-size:11px;line-height:1.7}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
  /* nav */
  nav{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:flex-end;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:8px 4px calc(8px + var(--sab));z-index:600}
  nav button{flex:1;border:0;background:transparent;color:var(--faint);font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;letter-spacing:.3px}
  nav button svg{width:23px;height:23px}
  nav button.on{color:var(--green)}
  nav .add{flex:0 0 auto}
  nav .add .plus{width:54px;height:54px;border-radius:50%;background:linear-gradient(150deg,var(--green-2),var(--green));color:#fff;display:grid;place-items:center;font-size:28px;box-shadow:0 8px 20px rgba(21,100,63,.42);margin-bottom:3px}
  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(12,22,15,.55);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;background:var(--card);border-radius:26px 26px 0 0;z-index:901;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);max-height:94dvh;overflow-y:auto;padding:8px 18px calc(28px + var(--sab));box-shadow:0 -10px 40px rgba(0,0,0,.25)}
  .sheet.show{transform:translateY(0)}
  .grab{width:40px;height:5px;border-radius:99px;background:#e3e3db;margin:8px auto 8px}
  .sheet h2{font-size:25px;margin:6px 0 2px;font-weight:600}
  .loc{color:var(--muted);font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .pill{font-size:11px;font-weight:800;padding:4px 10px;border-radius:99px;background:#f1f2ee;color:#5a645c;letter-spacing:.3px}
  .pill.gold{background:#f7eed4;color:#8a6a18}
  .pill.green{background:#e4f1ea;color:var(--green-d)}
  .scorehead{display:flex;align-items:center;gap:15px;margin:10px 0 16px}
  .scorehead .big{width:70px;height:70px;border-radius:18px;display:grid;place-items:center;color:#fff;font-weight:600;font-size:28px;flex:0 0 auto;font-family:"Fraunces",serif}
  .scorehead .sub{font-size:12.5px;color:var(--muted)}
  .scorehead .sub b{color:var(--ink)}
  .gallery{display:flex;gap:9px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none}
  .gallery::-webkit-scrollbar{display:none}
  .gallery img{height:104px;width:104px;border-radius:14px;object-fit:cover;flex:0 0 auto}
  .gallery .add{height:104px;width:104px;border-radius:14px;border:1.5px dashed #d3d6ce;display:grid;place-items:center;color:var(--muted);font-size:26px;flex:0 0 auto;background:var(--bg)}
  .fb{display:flex;align-items:center;gap:10px;margin:8px 0}
  .fb .fn{width:122px;font-size:13px;color:var(--muted)}
  .fb .ft{flex:1;height:7px;background:#edefe9;border-radius:99px;overflow:hidden}
  .fb .ft i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-2))}
  .fb .fv{width:30px;text-align:right;font-weight:800;font-size:13px;font-family:"Fraunces",serif}
  .btn{display:block;width:100%;border:0;border-radius:14px;padding:16px;font-size:16px;font-weight:800;margin-top:12px;font-family:inherit}
  .btn.primary{background:linear-gradient(150deg,var(--green-2),var(--green));color:#fff}
  .btn.ghost{background:#eef0ea;color:var(--ink)}
  .btn.dark{background:var(--ink);color:#fff}
  .field{margin-top:18px}
  .field>label{font-weight:800;font-size:11.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:block;margin-bottom:9px}
  /* who-played big toggles */
  .who{display:flex;gap:10px}
  .who button{flex:1;border:1.5px solid var(--line);background:var(--bg);border-radius:14px;padding:13px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;font-weight:700;font-size:13px;color:var(--ink)}
  .who button .av{width:34px;height:34px;font-size:14px;border-color:transparent}
  .who button.on{border-color:var(--green);background:#eef6f0}
  .slabel{display:flex;justify-content:space-between;align-items:baseline;margin:16px 0 3px}
  .slabel .t{font-weight:700;font-size:15px}
  .slabel .d{font-size:11.5px;color:var(--muted);max-width:56%;text-align:right}
  .slabel .v{font-weight:800;color:var(--green);font-size:16px;margin-left:8px;font-family:"Fraunces",serif}
  input[type=range]{-webkit-appearance:none;width:100%;height:30px;background:transparent}
  input[type=range]::-webkit-slider-runnable-track{height:8px;border-radius:99px;background:linear-gradient(90deg,var(--green) var(--p,70%),#e7e9e3 var(--p,70%))}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid var(--green);margin-top:-9px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  textarea,input.txt{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--ink)}
  textarea{resize:vertical;min-height:66px}
  .seg{display:flex;flex-wrap:wrap;gap:8px}
  .seg button{border:1px solid var(--line);background:var(--bg);color:var(--ink);padding:10px 15px;border-radius:11px;font-size:14px;font-weight:700}
  .seg button.on{background:var(--green);color:#fff;border-color:var(--green)}
  .twocol{display:flex;gap:10px}.twocol>div{flex:1}
  .row-pick{max-height:54dvh;overflow-y:auto;margin-top:6px}
  /* compare */
  .cmp{position:fixed;inset:0;z-index:950;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(12,22,15,.66)}
  .cmp.show{display:flex}
  .cmp-card{background:var(--card);border-radius:24px;padding:26px 24px;width:100%;max-width:430px;text-align:center;box-shadow:var(--shadow-lg)}
  .cmp-card h3{margin:0 0 2px;font-size:22px}
  .cmp-card .cmp-sub{color:var(--muted);font-size:12.5px;margin:0 0 14px}
  .deck{position:relative;height:286px;margin:4px 0}
  .swipe{position:absolute;inset:0;border-radius:20px;padding:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(160deg,#17402e,#0c241a);color:#fff;box-shadow:var(--shadow-lg);touch-action:none;will-change:transform;overflow:hidden;cursor:grab}
  .swipe.back{transform:scale(.93) translateY(12px);filter:brightness(.62)}
  .swipe .sname{font-family:"Fraunces",serif;font-size:27px;font-weight:600;line-height:1.1}
  .swipe .sloc{opacity:.72;font-size:13px;margin-top:7px}
  .swipe .svs{margin:16px 0 7px;font-size:10px;letter-spacing:2.5px;opacity:.55}
  .swipe .sopp{font-size:15px;opacity:.85}
  .swipe .star{color:var(--gold-soft)}
  .sw-lbl{position:absolute;top:20px;padding:6px 13px;border-radius:9px;font-weight:800;font-size:17px;border:2.5px solid;opacity:0;letter-spacing:1px}
  .sw-lbl.yes{right:18px;color:#7fd6a3;border-color:#7fd6a3;transform:rotate(11deg)}
  .sw-lbl.no{left:18px;color:#e88a73;border-color:#e88a73;transform:rotate(-11deg)}
  .sw-ctrl{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:16px}
  .sw-ctrl button{border:1.5px solid var(--line);background:var(--card);border-radius:50%;width:56px;height:56px;font-size:23px;display:grid;place-items:center}
  .sw-ctrl .no{color:var(--bad)} .sw-ctrl .yes{color:var(--green)}
  .sw-ctrl .tie{width:auto;height:auto;padding:11px 16px;border-radius:24px;font-size:12.5px;font-weight:800;color:var(--muted)}
  .sw-hint{font-size:11.5px;color:var(--faint);margin-top:12px}
  /* recap */
  #recapWrap{padding:6px 2px 0}
  .recap{border-radius:22px;overflow:hidden;background:#0c241a;color:#fff;position:relative}
  .recap .rphoto{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#143226}
  .recap .rgrad{position:absolute;left:0;right:0;top:0;height:60%;background:linear-gradient(180deg,rgba(0,0,0,.5),transparent)}
  .recap .rkick{position:absolute;top:16px;left:18px;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;opacity:.92}
  .recap .rscore{position:absolute;top:14px;right:16px;width:58px;height:58px;border-radius:15px;display:grid;place-items:center;font-weight:600;font-size:23px;color:#0c241a;font-family:"Fraunces",serif}
  .recap .ravs{position:absolute;left:18px;bottom:14px}
  .recap .rbody{padding:16px 18px 20px}
  .recap h3{margin:0;font-size:27px;letter-spacing:-.4px;font-weight:600}
  .recap .rsub{opacity:.78;font-size:13px;margin-top:4px}
  .recap .rbars{margin:15px 0 4px}
  .rbar{display:flex;align-items:center;gap:9px;margin:7px 0}
  .rbar .rn{width:112px;font-size:11.5px;opacity:.85;text-transform:uppercase;letter-spacing:.5px}
  .rbar .rt{flex:1;height:6px;background:rgba(255,255,255,.16);border-radius:99px;overflow:hidden}
  .rbar .rt i{display:block;height:100%;background:linear-gradient(90deg,#7fd6a3,#b9e8cd)}
  .rbar .rv{width:28px;text-align:right;font-weight:700;font-size:12px;font-family:"Fraunces",serif}
  .recap .rtags{display:flex;flex-wrap:wrap;gap:7px;margin-top:15px}
  .recap .rtag{font-size:11.5px;font-weight:700;padding:6px 11px;border-radius:10px;background:rgba(255,255,255,.1)}
  .recap .rtag em{font-style:normal;opacity:.6;text-transform:uppercase;letter-spacing:.6px;font-size:9.5px;margin-right:5px}
  .recap .rtag.win{background:rgba(127,214,163,.2);color:#c4f0d6}
  .recap .rfoot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;font-size:10.5px;opacity:.72;text-transform:uppercase;letter-spacing:1px}
  .empty{text-align:center;color:var(--muted);padding:10px 26px 30px;font-size:14px;line-height:1.5}
  .empty .emimg{width:100%;height:150px;object-fit:cover;border-radius:18px;margin-bottom:16px}
  .empty .em{font-size:30px;margin-bottom:8px}

<script>
(function(){
  "use strict";
  var FACTORS=[
    {k:"design",t:"Course Design",d:"Routing, shaping, strategy"},
    {k:"scenery",t:"Scenery & Setting",d:"Views, drama, natural beauty"},
    {k:"cond",t:"Conditioning",d:"Turf, greens and bunkers"},
    {k:"memory",t:"Memorability",d:"Signature holes you'll retell"},
    {k:"play",t:"Playability",d:"Fun to play your game"},
    {k:"fun",t:"Fun",d:"Would you race back?"},
    {k:"club",t:"Club Experience",d:"Service, clubhouse, vibe"},
    {k:"excl",t:"Exclusivity",d:"Access, prestige, rarity"}
  ];
  var KEY="rwGolf.v2"; // keep prior data
  var PRINCIPALS=["West","Rhod"];
  var COURSES=window.COURSES||[];
  var byName={}; COURSES.forEach(function(c){byName[c.n]=c;});

  /* ---------- shared backend ---------- */
  var CODE=localStorage.getItem("rwCode")||"";
  function hdr(){ var h={"Content-Type":"application/json"}; if(CODE)h["x-rw-code"]=CODE; return h; }
  function promptCode(){
    if(document.getElementById("codeGate"))return;
    var ov=document.createElement("div"); ov.id="codeGate";
    ov.style.cssText="position:fixed;inset:0;z-index:2000;background:#0c241a;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Inter,sans-serif";
    ov.innerHTML='<div style="max-width:340px;width:100%;text-align:center;color:#fff">'
      +'<div style="font-family:Fraunces,Georgia,serif;font-size:27px;font-weight:600;margin-bottom:6px">Rhod &amp; West</div>'
      +'<div style="opacity:.72;font-size:13px;margin-bottom:20px">Enter the shared access code</div>'
      +'<input id="codeInput" type="password" placeholder="Access code" autocomplete="off" style="width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:16px;text-align:center;margin-bottom:12px;box-sizing:border-box">'
      +'<button id="codeGo" style="width:100%;padding:14px;border:0;border-radius:12px;background:linear-gradient(150deg,#1c8b56,#15643f);color:#fff;font-weight:800;font-size:16px">Enter</button>'
      +'<div style="color:#e88a73;font-size:12px;margin-top:10px;height:14px">'+(CODE?"That code did not work — try again":"")+'</div></div>';
    document.body.appendChild(ov);
    var inp=ov.querySelector("#codeInput"),go=ov.querySelector("#codeGo");
    function submit(){ var c=inp.value.trim(); if(!c)return; CODE=c; localStorage.setItem("rwCode",c); location.reload(); }
    go.onclick=submit; inp.addEventListener("keydown",function(e){ if(e.key==="Enter")submit(); });
    setTimeout(function(){inp.focus();},100);
  }
  // photos live on the server, keyed by client id
  function putPhoto(id,dataUrl){ return fetch("/api/photo/"+id,{method:"PUT",headers:hdr(),body:JSON.stringify({data:dataUrl})}).catch(function(){}); }
  function delPhoto(id){ return fetch("/api/photo/"+id,{method:"DELETE",headers:hdr()}).catch(function(){}); }
  var photoCache={};
  function loadPhoto(id,imgEl){ if(photoCache[id]){imgEl.src=photoCache[id];return;} imgEl.src="/api/photo/"+encodeURIComponent(id); }
  function downscale(file){ return new Promise(function(res){ var img=new Image(),url=URL.createObjectURL(file);
    img.onload=function(){ var max=1280,w=img.width,h=img.height;
      if(w>h&&w>max){h=h*max/w;w=max;}else if(h>=w&&h>max){w=w*max/h;h=max;}
      var cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);res(cv.toDataURL("image/jpeg",0.82)); };
    img.onerror=function(){URL.revokeObjectURL(url);res(null);}; img.src=url; }); }

  /* ---------- shared state ---------- */
  var S=defaultState();
  function defaultState(){ return {ratings:{},order:[],t100:{},players:["Rhod","West"],trips:[],wishlist:[],dreamDone:{},activeTripId:null}; }
  function normalizeState(r){ r=r||{}; if(!r.ratings)r.ratings={}; if(!r.order)r.order=[]; if(!r.t100)r.t100={};
    if(!r.players||!r.players.length)r.players=["Rhod","West"]; if(!r.trips)r.trips=[]; if(!r.wishlist)r.wishlist=[]; if(!r.dreamDone)r.dreamDone={}; return r; }
  function loadState(){ return fetch("/api/state",{headers:hdr()}).then(function(r){ if(r.status===401){promptCode();throw 0;} return r.json(); })
    .then(function(d){ for(var k in S)delete S[k]; var n=normalizeState(d); for(var j in n)S[j]=n[j]; }); }
  var saveT=null,saving=false,saveAgain=false;
  function save(){ clearTimeout(saveT); saveT=setTimeout(function(){saveT=null;pushState();},500); }
  function pushState(){ if(saving){saveAgain=true;return;} saving=true;
    fetch("/api/state",{method:"PUT",headers:hdr(),body:JSON.stringify(S)})
      .then(function(r){ if(r.status===401)promptCode(); }).catch(function(){})
      .then(function(){ saving=false; if(saveAgain){saveAgain=false;pushState();} }); }
  function refreshState(){ if(saveT||saving)return; var sc=document.getElementById("scrim"); if(sc&&sc.classList.contains("show"))return;
    fetch("/api/state",{headers:hdr()}).then(function(r){return r.ok?r.json():null;}).then(function(d){ if(!d)return;
      var n=normalizeState(d); for(var j in n)S[j]=n[j]; activeTripId=S.activeTripId||null;
      buildDreamMarkers(); COURSES.forEach(refreshMarker); renderAll(); drawTrip(); updateTripBar(); }).catch(function(){}); }
  function pollUpdates(){ setInterval(refreshState,20000); document.addEventListener("visibilitychange",function(){ if(!document.hidden)refreshState(); }); }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  function isT100(c){ var o=S.t100[c.n]; return o===undefined?!!c.t100:!!o; }
  function rounds(name){ var r=S.ratings[name]; return (r&&r.rounds)||[]; }
  function isRated(name){ return rounds(name).length>0; }
  function allRounds(){ var out=[]; for(var n in S.ratings){ rounds(n).forEach(function(rd){out.push({course:n,rd:rd});}); }
    out.sort(function(a,b){return (a.rd.date<b.rd.date?1:a.rd.date>b.rd.date?-1:0);}); return out; }
  function roundScore(rd){ var s=0,n=0; FACTORS.forEach(function(f){ if(typeof rd[f.k]==="number"){s+=rd[f.k];n++;} }); return n?s/n:0; }
  function factorScore(name){ var rs=rounds(name); if(!rs.length)return null; var t=0;
    rs.forEach(function(r){t+=roundScore(r);}); return t/rs.length; }
  function beliScore(name){ var fs=factorScore(name); if(fs===null)return null; var N=S.order.length,idx=S.order.indexOf(name);
    if(N<2||idx<0)return Math.round(fs*10)/10; var rk=10*(N-1-idx)/(N-1); return Math.round((0.55*fs+0.45*rk)*10)/10; }
  function scoreColor(v){ if(v==null)return"#cdd2c9"; if(v>=8.5)return"#15643f"; if(v>=7)return"#3f9a64"; if(v>=5.5)return"#cf9a35"; return"#c75f43"; }
  function fmt(v){ return (Math.round(v*10)/10).toFixed(1); }
  function dateLabel(d){ try{return new Date(d+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});}catch(e){return d;} }

  /* who played */
  function whoTag(players){ players=players||[]; var w=players.indexOf("West")>=0,r=players.indexOf("Rhod")>=0;
    if(w&&r)return"both"; if(w)return"west"; if(r)return"rhod"; return"guest"; }
  function avClass(name){ if(name==="West")return"w"; if(name==="Rhod")return"r"; return"g"; }
  function avatarsFor(players,lg){ players=players||[]; var grp=h("div",{class:"avgrp"});
    var ordered=[]; if(players.indexOf("West")>=0)ordered.push("West"); if(players.indexOf("Rhod")>=0)ordered.push("Rhod");
    players.forEach(function(p){ if(PRINCIPALS.indexOf(p)<0)ordered.push(p); });
    ordered.slice(0,3).forEach(function(p){ grp.appendChild(h("div",{class:"av "+avClass(p)+(lg?" lg":""),title:p},p[0].toUpperCase())); });

  function insertByCompare(c,done){ var list=S.order.filter(function(n){return n!==c.n&&isRated(n);});
    if(!list.length){S.order.unshift(c.n);save();return done();}
    var lo=0,hi=list.length;
    (function step(){ if(lo>=hi){var ref=lo<list.length?list[lo]:null;var pos=ref?S.order.indexOf(ref):S.order.length;if(pos<0)pos=S.order.length;S.order.splice(pos,0,c.n);save();return done();}
      var mid=(lo+hi)>>1; compare(c.n,list[mid],"Which was better?",function(res){if(res==="a")hi=mid;else if(res==="b")lo=mid+1;else hi=mid;step();}); })(); }
  function reRank(c){ var i=S.order.indexOf(c.n);if(i>=0)S.order.splice(i,1); insertByCompare(c,function(){refreshMarker(c);renderAll();toast("Re-ranked · "+c.n);setTimeout(function(){openCourse(c);},200);}); }

    var front=h("div",{class:"swipe front"});
    var lblY=h("div",{class:"sw-lbl yes"},"BETTER"),lblN=h("div",{class:"sw-lbl no"},"WORSE");
    front.appendChild(lblY); front.appendChild(lblN);

    front.appendChild(h("div",{class:"sloc"},ca?ca.s:""));

    front.appendChild(h("div",{class:"sopp",html:bName+(cbb&&isT100(cbb)?' <span class="star">★</span>':"")+(S.order.indexOf(bName)>=0?"  ·  currently #"+(S.order.indexOf(bName)+1):"")}));
    deck.appendChild(back); deck.appendChild(front); card.appendChild(deck);
    var ctrl=h("div",{class:"sw-ctrl"});
    var bNo=h("button",{class:"no"},"✕"),bTie=h("button",{class:"tie"},"Too close"),bYes=h("button",{class:"yes"},"✓");
    ctrl.appendChild(bNo);ctrl.appendChild(bTie);ctrl.appendChild(bYes); card.appendChild(ctrl);
    card.appendChild(h("div",{class:"sw-hint"},"Swipe → better  ·  ← worse  ·  ↑ too close"));
    cmp.appendChild(card); cmp.classList.add("show");
    var sx=0,sy=0,drag=false,done=false;
    front.addEventListener("pointerdown",function(e){drag=true;sx=e.clientX;sy=e.clientY;front.style.transition="none";try{front.setPointerCapture(e.pointerId);}catch(_){}});
    front.addEventListener("pointermove",function(e){ if(!drag)return; var dx=e.clientX-sx,dy=e.clientY-sy;
      front.style.transform="translate("+dx+"px,"+dy+"px) rotate("+(dx/20)+"deg)";
      lblY.style.opacity=Math.max(0,Math.min(1,dx/100)); lblN.style.opacity=Math.max(0,Math.min(1,-dx/100)); });
    function end(e){ if(!drag)return; drag=false; var dx=e.clientX-sx,dy=e.clientY-sy; front.style.transition="transform .3s ease";
      if(dx>95)fly(1,"a"); else if(dx<-95)fly(-1,"b"); else if(dy<-100)resolve("tie");
      else{front.style.transform="";lblY.style.opacity=0;lblN.style.opacity=0;} }

    function resolve(res){ if(done)return; done=true; cmp.classList.remove("show"); setTimeout(function(){cb(res);},150); }
    bNo.onclick=function(){fly(-1,"b");}; bYes.onclick=function(){fly(1,"a");}; bTie.onclick=function(){resolve("tie");};

  var activeTripId=S.activeTripId||null;
  function tripById(id){ return S.trips.filter(function(t){return t.id===id;})[0]; }
  function haversine(a,b){ var R=3958.8,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,la1=a.lat*Math.PI/180,la2=b.lat*Math.PI/180;
    var x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.sin(dLng/2)*Math.sin(dLng/2)*Math.cos(la1)*Math.cos(la2); return 2*R*Math.asin(Math.sqrt(x)); }
  function tripDistance(st){ var t=0; for(var i=1;i<st.length;i++)t+=haversine(st[i-1],st[i]); return t; }
  function optimize(st){ if(st.length<3)return st.slice(); var rem=st.slice(),route=[rem.shift()];
    while(rem.length){ var last=route[route.length-1],bi=0,bd=Infinity; rem.forEach(function(s,i){var d=haversine(last,s);if(d<bd){bd=d;bi=i;}}); route.push(rem.splice(bi,1)[0]); } return route; }
  function setActiveTrip(id){ activeTripId=id; S.activeTripId=id; save(); drawTrip(); updateTripBar(); }
  function addToTrip(stop){ var t=activeTripId?tripById(activeTripId):null;
    if(!t){ t={id:uid(),name:"Road Trip",stops:[]}; S.trips.push(t); activeTripId=t.id; S.activeTripId=t.id; }
    if(t.stops.some(function(s){return s.n===stop.n;})){toast(stop.n+" is already in "+t.name);return;}
    t.stops.push({n:stop.n,s:stop.s||"",lat:stop.lat,lng:stop.lng}); save(); drawTrip(); updateTripBar(); toast("Added "+stop.n+" to "+t.name); }

    var ord=optimize(t.stops),ll=[]; ord.forEach(function(s,i){ ll.push([s.lat,s.lng]); var m=L.marker([s.lat,s.lng],{icon:tripPin(i+1)}); m.on("click",function(){openTripDetail(t.id);}); tripLayer.addLayer(m); });
    if(ll.length>1)tripLayer.addLayer(L.polyline(ll,{color:"#0c6e3c",weight:3,opacity:.85,dashArray:"3,9"})); }

  function nearbyGems(t){ if(!t.stops.length)return []; var out=[];
    dreamAll.forEach(function(d){ if(dreamPlayed(d))return; if(t.stops.some(function(s){return s.n===d.n;}))return;

    document.querySelectorAll("nav button[data-v]").forEach(function(b){b.classList.toggle("on",b.dataset.v===v);});
    if(v==="map"&&map)setTimeout(function(){map.invalidateSize();drawTrip();},120); }
  document.querySelectorAll("nav button[data-v]").forEach(function(b){b.onclick=function(){switchView(b.dataset.v);};});
  document.getElementById("feed-all").onclick=function(e){e.preventDefault();switchView("rank");};
  document.querySelectorAll("#feed-filters .chip").forEach(function(ch){ ch.onclick=function(){ document.querySelectorAll("#feed-filters .chip").forEach(function(x){x.classList.remove("on");}); ch.classList.add("on"); feedFilter=ch.dataset.w; renderFeed(); }; });
  document.querySelectorAll("#rank-filters .chip").forEach(function(ch){ ch.onclick=function(){ document.querySelectorAll("#rank-filters .chip").forEach(function(x){x.classList.remove("on");}); ch.classList.add("on"); rankFilter=ch.dataset.f; renderRank(); }; });
  document.querySelectorAll("#dream-seg .chip").forEach(function(ch){ ch.onclick=function(){ document.querySelectorAll("#dream-seg .chip").forEach(function(x){x.classList.remove("on");}); ch.classList.add("on"); dreamSeg=ch.dataset.d; renderDream(); }; });
  document.getElementById("q").oninput=function(e){query=e.target.value.trim().toLowerCase();renderRank();};

  function boot(){ activeTripId=S.activeTripId||null; initMap(); renderAll(); drawTrip(); updateTripBar(); pollUpdates(); }
  loadState().then(boot).catch(function(){ boot(); });
})();
</script>
</body>
</html>
